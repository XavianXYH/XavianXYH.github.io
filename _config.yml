# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default" 
title                    : "Yuhuan Xie (Xavian)"
title_separator          : "-"
name                     : &name "Yuhuan Xie"
description              : &description "Personal academic website of Yuhuan Xie, Research Assistant at HKU."
url                      : "https://XavianXYH.github.io" 
baseurl                  : "" 
repository               : "XavianXYH/XavianXYH.github.io"

# Site Author - 这里的设置将直接影响页面左侧栏的显示
author:
  # 基础信息
  avatar           : "profile.jpg" # 确保你在 images/ 文件夹下上传了名为 profile.jpg 的照片
  name             : "Yuhuan Xie（谢雨桓）"
  pronouns         : "he/him"  
  bio              : "Research Assistant at HKU. Focusing on 3D Generation, Diffusion Models, and 3DGS."
  location         : "Shenzhen, China"
  employer         : "University of Hong Kong"
  uri              : 
  email            : "u3636697@connect.hku.hk" 

  # 学术网站 (如果你有了链接可以填入，暂时没有的保持留空)
  academia         : 
  arxiv            : 
  googlescholar    : 
  inspire-hep      : 
  impactstory      : 
  orcid            : 
  semantic         : 
  ssrn             : 
  pubmed           : 
  researchgate     : 
  scopus           : 
  zotero           : 

  # 代码开发相关
  bitbucket        : 
  codepen          : 
  dribbble         : 
  github           : "XavianXYH" # 你的 GitHub 用户名
  kaggle           :   
  stackoverflow    :     

  # 社交媒体 (暂时关闭不需要的，如有需要可取消注释)
  artstation       : 
  bluesky          : 
  facebook         : 
  flickr           : 
  foursquare       : 
  goodreads        : 
  google_plus      : 
  keybase          : 
  instagram        : 
  lastfm           : 
  linkedin         : 
  mastodon         : 
  medium           : 
  pinterest        : 
  soundcloud       : 
  steam            : 
  telegram         : 
  tumblr           : 
  twitter          : 
  vine             : 
  weibo            : 
  wikipedia        : 
  xing             : 
  youtube          : 
  zhihu            : 

# 论文分类设置
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# 站点功能设置
teaser                   :  
breadcrumbs              : false 
words_per_minute         : 160
future                   : true
read_more                : "disabled" 
talkmap_link             : false      
comments:
  provider               : false 
atom_feed:
  hide                   : false     
  path                   : 

# SEO & Analytics
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

analytics:
  provider               : "false" 

# 包含/排除文件
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Markdown 渲染设置
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# 内容集合设置
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# 默认页面布局
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

sass:
  sass_dir: _sass
  style: compressed 

permalink: /:categories/:title/
timezone: Etc/UTC 

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
